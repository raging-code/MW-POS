<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Viewport: width=device-width keeps layout correct on every screen size.
      initial-scale=1 prevents iOS double-tap zoom.
      viewport-fit=cover extends content into notch/punch-hole areas on modern phones.
      user-scalable=no disables pinch-zoom (POS app; prevents accidental zooms mid-sale).
      shrink-to-fit=no is an iOS 9 quirk-fix (harmless on Android).
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
               minimum-scale=1.0, user-scalable=no, viewport-fit=cover,
               shrink-to-fit=no"
    />

    <!-- Prevent phone-number / address auto-detection (causes layout reflow on Android) -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!--
      FIX: Was #111827 (near-black). The app's header background is #FFFFFF (white)
      and the page background is #F0EDE8 (warm beige). Using #111827 caused the
      Android system status bar to render dark even though the app header is white,
      creating a jarring contrast. #FFFFFF matches the header the user sees first.
    -->
    <meta name="theme-color" content="#FFFFFF" />

    <!-- Capacitor apps are always installed — no need to be indexed by search engines -->
    <meta name="robots" content="noindex, nofollow" />

    <!--
      x-dns-prefetch-control on (some WebView forks disable DNS prefetch by default).
      This meta tag re-enables it, making the preconnect/dns-prefetch hints below effective.
    -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />

    <!-- ── Favicons & PWA ──────────────────────────────────────────────── -->

    <!-- Modern browsers: scalable SVG tab icon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Legacy browsers: .ico fallback (Chrome <80, IE, older Edge) -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico" sizes="48x48" />

    <!-- Standard PNG favicon (used by some tools, link previews, bookmarks) -->
    <link rel="icon" type="image/png" href="./favicon-96x96.png" sizes="96x96" />

    <!-- iOS "Add to Home Screen" icon -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- PWA manifest: enables "Add to Home Screen" prompt on Android Chrome -->
    <link rel="manifest" href="./site.webmanifest" />

    <!-- ── Preconnects ──────────────────────────────────────────────────── -->

    <!--
      Preconnect to the Cloudflare Workers API origin so the first API call
      (menu fetch on mount) skips the TCP + TLS handshake cold-start.
      Replace the href with your actual worker URL.
    -->
    <link rel="preconnect" href="https://pos-worker.mangowarrior-pos.workers.dev" crossorigin />

    <!-- DNS prefetch as a fallback for browsers/WebViews that ignore preconnect -->
    <link rel="dns-prefetch" href="https://pos-worker.mangowarrior-pos.workers.dev" />

    <!--
      Preconnect to Google Fonts so the font CSS + woff2 files load faster.
      Without this, Plus Jakarta Sans / DM Sans are fetched cold on first paint,
      causing FOIT on slow connections. `display=swap` (in index.css import) handles
      the invisible-text fallback; preconnect handles the TCP cold-start.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>MangoWarrior POS</title>

    <!--
      Critical inline style to paint the correct background immediately.
      Without this, Android WebView shows a white flash (the browser default
      background) for ~100-200 ms while index.css loads and parses.
      This tiny inline block matches `--surface-page: #F0EDE8` and body
      background so there is zero visible transition.
    -->
    <style>
      html, body, #root { background: #F0EDE8; }
    </style>
    <script type="module" crossorigin src="./assets/index-CXLMRLcZ.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/vendor-CafjmkfR.js">
    <link rel="modulepreload" crossorigin href="./assets/react-core-D3euc0Cw.js">
    <link rel="modulepreload" crossorigin href="./assets/query-Da1iV_5l.js">
    <link rel="modulepreload" crossorigin href="./assets/utils-_EuERglx.js">
    <link rel="modulepreload" crossorigin href="./assets/icons-BZ46l-QP.js">
    <link rel="modulepreload" crossorigin href="./assets/date-fns-DqkCRz1U.js">
    <link rel="stylesheet" crossorigin href="./assets/index-Ze_GXbMv.css">
  </head>
  <body>
    <!--
      #root must exist before the script runs.
      The inline critical style above handles the base background so there
      is no white flash while the JS bundle evaluates on slow devices.
    -->
    <div id="root"></div>
  </body>
</html>
